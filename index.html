<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Directory 2026 — Tous les outils IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b0e;--sf:#141418;--sf2:#1c1c22;--sf3:#232329;--bd:#28282f;
  --tx:#eeeef3;--mu:#72728a;--mu2:#52526a;
  --ac:#7b6ef6;--acl:#a99ef9;--acbg:rgba(123,110,246,.12);--acbd:rgba(123,110,246,.3);
  --gn:#22c77a;--gnbg:rgba(34,199,122,.1);--gnbd:rgba(34,199,122,.25);
  --am:#f59e0b;--ambg:rgba(245,158,11,.1);--ambd:rgba(245,158,11,.25);
  --co:#ef5353;--cobg:rgba(239,83,83,.1);--cobd:rgba(239,83,83,.25);
  --bl:#38b5f5;--blbg:rgba(56,181,245,.1);--blbd:rgba(56,181,245,.25);
  --or:#f97316;--orbg:rgba(249,115,22,.1);--orbd:rgba(249,115,22,.25);
  --pk:#e879b0;--pkbg:rgba(232,121,176,.1);
  --sidebar:220px;
}
html{scroll-behavior:smooth;height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.6;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

header{border-bottom:1px solid var(--bd);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;background:rgba(11,11,14,.96);backdrop-filter:blur(16px);z-index:60;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-size:17px;color:var(--tx);text-decoration:none;display:flex;align-items:center;gap:7px;font-weight:800}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--ac);box-shadow:0 0 9px var(--ac);flex-shrink:0}
.h-right{display:flex;align-items:center;gap:10px}
.h-count{font-size:12px;color:var(--mu);background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:3px 10px}
.h-quiz{font-size:12px;color:var(--acl);background:var(--acbg);border:1px solid var(--acbd);border-radius:20px;padding:3px 12px;cursor:pointer;transition:all .15s}
.h-quiz:hover{background:var(--ac);color:#fff}

.app{display:flex;flex:1;min-height:0}

.sidebar{width:var(--sidebar);flex-shrink:0;border-right:1px solid var(--bd);padding:1rem 0;overflow-y:auto;position:sticky;top:52px;height:calc(100vh - 52px);background:var(--sf)}
.sb-section{margin-bottom:1rem}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu2);padding:0 1rem;margin-bottom:4px}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:6px 1rem;cursor:pointer;border-radius:0;transition:background .13s;color:var(--mu);font-size:12px;font-weight:500;gap:6px}
.sb-item:hover{background:var(--sf2);color:var(--tx)}
.sb-item.on{background:var(--acbg);color:var(--acl);border-right:2px solid var(--ac)}
.sb-item-left{display:flex;align-items:center;gap:7px}
.sb-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.sb-count{font-size:10px;color:var(--mu2);background:var(--sf3);border:1px solid var(--bd);border-radius:10px;padding:1px 6px;flex-shrink:0}
.sb-divider{height:1px;background:var(--bd);margin:8px 0}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.search-wrap{padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0}
.sw{position:relative;margin-bottom:.75rem}
.sw svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--mu);pointer-events:none}
.sw input{width:100%;height:42px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:0 13px 0 40px;font-size:14px;color:var(--tx);font-family:'Inter',sans-serif;outline:none;transition:border-color .18s}
.sw input::placeholder{color:var(--mu)}
.sw input:focus{border-color:var(--ac);background:var(--sf2)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.fl{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;margin-right:2px}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--bd);cursor:pointer;background:var(--sf2);color:var(--mu);transition:all .12s;white-space:nowrap}
.tag:hover{border-color:var(--ac);color:var(--acl)}
.tag.on{background:var(--acbg);color:var(--acl);border-color:var(--acbd)}
.ss{height:30px;padding:0 9px;background:var(--sf2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;outline:none}

.results-bar{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.25rem;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.rb-left{font-size:12px;color:var(--mu)}
.rb-right{font-size:11px;color:var(--acl)}

.grid-wrap{flex:1;overflow-y:auto;padding:1rem 1.25rem 5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:.9rem 1rem;transition:border-color .15s,transform .12s,box-shadow .15s;position:relative;display:flex;flex-direction:column;cursor:default}
.card:hover{border-color:rgba(123,110,246,.4);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.25)}
.card.sel{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px}
.clogo{width:36px;height:36px;border-radius:8px;flex-shrink:0;overflow:hidden;background:var(--sf2);display:flex;align-items:center;justify-content:center}
.clogo img{width:100%;height:100%;object-fit:contain}
.card-title-wrap{flex:1;min-width:0}
.cn{font-size:13px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cd{font-size:11px;color:var(--mu);margin-top:1px}
.crat{position:absolute;top:9px;right:9px;font-size:10px;font-weight:600;color:var(--am);background:var(--ambg);border:1px solid var(--ambd);padding:2px 6px;border-radius:5px}
.cdesc{font-size:11.5px;color:var(--mu);line-height:1.5;flex:1;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.meta-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;align-items:center}
.dep{font-size:10px;font-weight:500;padding:1px 6px;border-radius:4px;border:1px solid transparent;white-space:nowrap}
.dep-local{background:var(--gnbg);color:var(--gn);border-color:var(--gnbd)}
.dep-cloud{background:var(--blbg);color:var(--bl);border-color:var(--blbd)}
.dep-web{background:var(--acbg);color:var(--acl);border-color:var(--acbd)}
.dep-app{background:var(--ambg);color:var(--am);border-color:var(--ambd)}
.dep-api{background:var(--pkbg);color:var(--pk);border-color:rgba(232,121,176,.25)}
.cens{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;border:1px solid transparent}
.cens-dot{width:5px;height:5px;border-radius:50%}
.cens-0{background:var(--cobg);color:var(--co);border-color:var(--cobd)}
.cens-0 .cens-dot{background:var(--co)}
.cens-1{background:var(--ambg);color:var(--am);border-color:var(--ambd)}
.cens-1 .cens-dot{background:var(--am)}
.cens-2{background:var(--orbg);color:var(--or);border-color:var(--orbd)}
.cens-2 .cens-dot{background:var(--or)}
.cens-3{background:var(--gnbg);color:var(--gn);border-color:var(--gnbd)}
.cens-3 .cens-dot{background:var(--gn)}

.badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.b{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;border:1px solid transparent}
.bpu{background:var(--acbg);color:var(--acl);border-color:var(--acbd)}
.bgn{background:var(--gnbg);color:var(--gn);border-color:var(--gnbd)}
.bam{background:var(--ambg);color:var(--am);border-color:var(--ambd)}
.bco{background:var(--cobg);color:var(--co);border-color:var(--cobd)}
.bbl{background:var(--blbg);color:var(--bl);border-color:var(--blbd)}
.bgy{background:rgba(114,114,138,.08);color:var(--mu);border-color:var(--bd)}

.card-foot{display:flex;gap:5px;margin-top:auto}
.btn-detail{flex:1;height:28px;font-size:11px;font-family:'Inter',sans-serif;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;transition:all .12s}
.btn-detail:hover{border-color:var(--ac);color:var(--acl);background:var(--acbg)}
.btn-cmp{width:28px;height:28px;font-size:14px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;transition:all .12s}
.btn-cmp:hover,.btn-cmp.on{border-color:var(--ac);color:var(--acl);background:var(--acbg)}

.cbar{position:fixed;bottom:0;left:var(--sidebar);right:0;background:rgba(20,20,24,.98);border-top:1px solid var(--bd);padding:10px 1.25rem;display:none;align-items:center;gap:10px;z-index:40;backdrop-filter:blur(12px)}
.cbar.show{display:flex}
.chips{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.chip{font-size:11px;padding:3px 8px;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);display:flex;align-items:center;gap:4px}
.chip button{background:none;border:none;color:var(--mu);cursor:pointer;font-size:13px;line-height:1}
.btn-pri{height:32px;padding:0 14px;background:var(--ac);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap}
.btn-pri:hover{background:var(--acl);color:var(--bg)}
.btn-sec{height:32px;padding:0 10px;background:transparent;color:var(--mu);border:1px solid var(--bd);border-radius:7px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}

.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center;padding:1rem}
.ov.open{display:flex}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:1.5rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative}
.modal.wide{max-width:780px}
.mcl{position:absolute;top:12px;right:12px;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;width:27px;height:27px;font-size:15px;cursor:pointer;color:var(--mu);display:flex;align-items:center;justify-content:center}
.mcl:hover{color:var(--tx)}
.mh{display:flex;align-items:center;gap:12px;margin-bottom:.8rem}
.mico{width:46px;height:46px;border-radius:10px;overflow:hidden;background:var(--sf2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mico img{width:100%;height:100%;object-fit:contain}
.mn{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.ms{font-size:12px;color:var(--mu);margin-top:2px}
.mdesc{font-size:13px;color:var(--mu);line-height:1.62;margin-bottom:.9rem}
.msec{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mu2);margin:.9rem 0 5px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.db{background:var(--sf2);border-radius:8px;padding:9px 10px}
.dl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.dv{font-size:12px;font-weight:500;color:var(--tx)}
.plat-list{display:flex;gap:4px;flex-wrap:wrap}
.plat{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--sf2);color:var(--mu);border:1px solid var(--bd)}
.ma{display:flex;gap:6px;margin-top:1rem}
.bvis{flex:1;height:36px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px}
.bvis:hover{background:var(--acl);color:var(--bg)}
.bac{height:36px;padding:0 12px;background:transparent;color:var(--mu);border:1px solid var(--bd);border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}
.bac:hover{border-color:var(--ac);color:var(--acl)}

.quiz-modal{max-width:480px}
.q-step{display:none}
.q-step.active{display:block}
.q-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:.5rem}
.q-sub{font-size:13px;color:var(--mu);margin-bottom:1rem}
.q-options{display:flex;flex-direction:column;gap:6px}
.q-opt{padding:10px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;cursor:pointer;font-size:13px;color:var(--tx);transition:all .13s;text-align:left}
.q-opt:hover{border-color:var(--ac);background:var(--acbg);color:var(--acl)}
.q-opt.selected{border-color:var(--ac);background:var(--acbg);color:var(--acl)}
.q-nav{display:flex;gap:6px;margin-top:1rem;justify-content:flex-end}
.q-prog{display:flex;gap:4px;margin-bottom:1rem}
.q-dot{width:6px;height:6px;border-radius:50%;background:var(--bd)}
.q-dot.done{background:var(--ac)}

.ct{width:100%;border-collapse:collapse;font-size:11px}
.ct th{text-align:left;padding:7px 9px;background:var(--sf2);color:var(--mu);font-size:10px;font-weight:500;border-bottom:1px solid var(--bd)}
.ct td{padding:7px 9px;border-bottom:1px solid var(--bd);color:var(--tx);vertical-align:middle}
.ct tr:last-child td{border-bottom:none}
.ct td:first-child{color:var(--mu);font-size:10px;font-weight:500;white-space:nowrap}

.nores{grid-column:1/-1;text-align:center;padding:4rem 0;color:var(--mu)}
.nores-icon{font-size:36px;margin-bottom:12px}
.nores h3{font-size:15px;color:var(--tx);margin-bottom:6px}

@media(max-width:700px){
  :root{--sidebar:0px}
  .sidebar{display:none}
  .cbar{left:0}
  header{padding:0 1rem}
  .search-wrap,.grid-wrap{padding-left:1rem;padding-right:1rem}
}

.geo-banner {
    background: linear-gradient(135deg, #0f3460, #16213e);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid var(--acbd);
    font-size: 12px;
}
.geo-banner-left {
    display: flex;
    align-items: center;
    gap: 10px;
}
.geo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    animation: pulse 1.5s infinite;
}
.geo-dot-active { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
.geo-dot-inactive { background: #f87171; }
.geo-banner-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
}
.geo-banner-btn:hover {
    background: rgba(255,255,255,0.3);
}
.geo-banner-btn-primary {
    background: #e94560;
    border-color: #e94560;
}
.geo-banner-btn-primary:hover {
    background: #c72a48;
}
@keyframes pulse {
    0% { opacity: 0.5; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
}
.geo-status-text {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
}
</style>
</head>
<body>

<div class="geo-banner" id="geoBanner">
    <div class="geo-banner-left">
        <span>📍</span>
        <span>Géolocalisation</span>
        <span id="geoDot" class="geo-dot geo-dot-inactive"></span>
        <span id="geoStatus" class="geo-status-text">Non localisé</span>
    </div>
    <div>
        <button class="geo-banner-btn" id="geoLocateBtn">📍 Me localiser</button>
        <button class="geo-banner-btn geo-banner-btn-primary" id="geoViewMapBtn">🗺️ Voir sur la carte</button>
    </div>
</div>

<header>
  <a href="#" class="logo"><span class="ldot"></span>AI/DIRECTORY</a>
  <div class="h-right">
    <span class="h-count" id="hc">— outils</span>
    <button class="h-quiz" onclick="openQuiz()">🎯 Quel outil pour moi ?</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-section">
      <div class="sb-label">Domaine</div>
      <div id="sb-doms"></div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section">
      <div class="sb-label">Déploiement</div>
      <div id="sb-deps"></div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section">
      <div class="sb-label">Censure</div>
      <div id="sb-cens"></div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section">
      <div class="sb-label">Tarif</div>
      <div id="sb-price"></div>
    </div>
  </aside>

  <div class="main">
    <div class="search-wrap">
      <div class="sw">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="q" placeholder="Rechercher par nom ou tag…" oninput="render()">
      </div>
      <div class="filter-row">
        <span class="fl">Type :</span>
        <div class="filter-group" id="typs"></div>
        <div style="margin-left:auto">
          <select class="ss" id="srt" onchange="render()">
            <option value="">Popularité</option>
            <option value="name">Nom A–Z</option>
            <option value="rating">Meilleure note</option>
            <option value="free">Gratuit d'abord</option>
            <option value="uncensored">Non censuré d'abord</option>
          </select>
        </div>
      </div>
    </div>

    <div class="results-bar">
      <span class="rb-left" id="rc">Chargement…</span>
      <span class="rb-right">Sélectionnez jusqu'à 4 IAs pour les comparer →</span>
    </div>

    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<div class="cbar" id="cbar">
  <div class="chips" id="chips"></div>
  <button class="btn-sec" onclick="clrC()">Effacer</button>
  <button class="btn-pri" onclick="openCmp()">Comparer ↗</button>
</div>

<div class="ov" id="ov" onclick="ovCl(event)"><div class="modal" id="mi"></div></div>
<div class="ov" id="ov-quiz" onclick="ovCl2(event)">
  <div class="modal quiz-modal" id="quiz-inner">
    <button class="mcl" onclick="closeQuiz()">×</button>
    <div class="q-prog" id="q-prog"></div>
    <div id="q-steps"></div>
  </div>
</div>

<script>
// ==================== GÉOLOCALISATION ====================
(function() {
    const dot = document.getElementById('geoDot');
    const statusSpan = document.getElementById('geoStatus');
    const locateBtn = document.getElementById('geoLocateBtn');
    const mapBtn = document.getElementById('geoViewMapBtn');
    
    function updateUI() {
        const lat = sessionStorage.getItem('userLat');
        if (lat) {
            dot.className = 'geo-dot geo-dot-active';
            const latShort = parseFloat(lat).toFixed(4);
            const lonShort = parseFloat(sessionStorage.getItem('userLon')).toFixed(4);
            statusSpan.innerHTML = `📍 Localisé (${latShort}, ${lonShort})`;
        } else {
            dot.className = 'geo-dot geo-dot-inactive';
            statusSpan.innerHTML = '📍 Non localisé';
        }
    }
    
    function askLocation() {
        if (!navigator.geolocation) {
            alert("❌ Votre navigateur ne supporte pas la géolocalisation");
            return;
        }
        
        locateBtn.disabled = true;
        locateBtn.textContent = "⏳ Localisation...";
        
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const acc = position.coords.accuracy;
                
                sessionStorage.setItem('userLat', lat);
                sessionStorage.setItem('userLon', lon);
                sessionStorage.setItem('userAcc', acc);
                sessionStorage.setItem('userLocTime', Date.now());
                
                updateUI();
                locateBtn.disabled = false;
                locateBtn.textContent = "📍 Me localiser";
                
                alert(`✅ Position enregistrée !\nLatitude: ${lat.toFixed(6)}\nLongitude: ${lon.toFixed(6)}\nPrécision: ±${Math.round(acc)}m`);
            },
            (error) => {
                let msg = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        msg = "Permission refusée. Autorisez l'accès à votre position.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        msg = "Position indisponible. Vérifiez votre GPS/Wi-Fi.";
                        break;
                    case error.TIMEOUT:
                        msg = "Délai dépassé. Réessayez.";
                        break;
                    default:
                        msg = "Erreur inconnue.";
                }
                alert("❌ " + msg);
                locateBtn.disabled = false;
                locateBtn.textContent = "📍 Me localiser";
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    }
    
    function goToMap() {
        const lat = sessionStorage.getItem('userLat');
        const lon = sessionStorage.getItem('userLon');
        const acc = sessionStorage.getItem('userAcc');
        
        if (lat && lon) {
            window.location.href = `https://ma-carte-zeta.vercel.app?lat=${lat}&lon=${lon}&acc=${acc}`;
        } else {
            const confirm = window.confirm("Vous n'avez pas encore partagé votre position. Voulez-vous le faire maintenant ?");
            if (confirm) {
                askLocation();
                setTimeout(() => {
                    if (sessionStorage.getItem('userLat')) {
                        window.location.href = `https://ma-carte-zeta.vercel.app?lat=${sessionStorage.getItem('userLat')}&lon=${sessionStorage.getItem('userLon')}&acc=${sessionStorage.getItem('userAcc')}`;
                    }
                }, 3000);
            }
        }
    }
    
    locateBtn.addEventListener('click', askLocation);
    mapBtn.addEventListener('click', goToMap);
    updateUI();
})();

(function() {
    function requestLocationAndRedirect() {
        if (!navigator.geolocation) {
            alert("❌ Votre navigateur ne supporte pas la géolocalisation");
            return false;
        }
        
        if (sessionStorage.getItem('userLat')) {
            const lat = sessionStorage.getItem('userLat');
            const lon = sessionStorage.getItem('userLon');
            const acc = sessionStorage.getItem('userAcc');
            window.location.href = `https://ma-carte-zeta.vercel.app?lat=${lat}&lon=${lon}&acc=${acc}`;
            return true;
        }
        
        navigator.geolocation.getCurrentPosition(
            (position) => {
                sessionStorage.setItem('userLat', position.coords.latitude);
                sessionStorage.setItem('userLon', position.coords.longitude);
                sessionStorage.setItem('userAcc', position.coords.accuracy);
                sessionStorage.setItem('userLocTime', Date.now());
                
                const dot = document.getElementById('geoDot');
                const statusSpan = document.getElementById('geoStatus');
                if (dot) dot.className = 'geo-dot geo-dot-active';
                if (statusSpan) statusSpan.innerHTML = `📍 Localisé (${position.coords.latitude.toFixed(4)}, ${position.coords.longitude.toFixed(4)})`;
                
                window.location.href = `https://ma-carte-zeta.vercel.app?lat=${position.coords.latitude}&lon=${position.coords.longitude}&acc=${position.coords.accuracy}`;
            },
            (error) => {
                let msg = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        msg = "Vous devez autoriser la géolocalisation";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        msg = "Position indisponible";
                        break;
                    case error.TIMEOUT:
                        msg = "Délai dépassé";
                        break;
                }
                alert("❌ " + msg);
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
        return true;
    }
    
    function bindToAllClickableElements() {
        const selectors = ['button', 'a', '.card', '.sb-item', '.tag', '.btn-detail', '.btn-cmp', '.h-quiz'];
        const elements = document.querySelectorAll(selectors.join(','));
        
        elements.forEach(el => {
            if (el.hasAttribute('data-geo-bound')) return;
            if (el.id === 'geoLocateBtn' || el.id === 'geoViewMapBtn') return;
            
            el.setAttribute('data-geo-bound', 'true');
            
            el.addEventListener('click', (e) => {
                if (!sessionStorage.getItem('userLat')) {
                    e.preventDefault();
                    e.stopPropagation();
                    requestLocationAndRedirect();
                }
            });
        });
    }
    
    document.addEventListener('DOMContentLoaded', bindToAllClickableElements);
    
    const observer = new MutationObserver(() => bindToAllClickableElements());
    observer.observe(document.body, { childList: true, subtree: true });
})();

  const steps=document.getElementById("q-steps");
  const prog=document.getElementById("q-prog");
  prog.innerHTML=QUIZ.map((_,i)=>`<div class="q-dot${i<qStep?" done":""}"></div>`).join("");
  if(qStep>=QUIZ.length){
    steps.innerHTML=`<div class="q-title">🎯 Voici vos outils recommandés</div><div class="q-sub" style="margin-bottom:1rem">Basé sur vos réponses</div><div class="grid" style="grid-template-columns:1fr;gap:7px">${getRecos().map(a=>`<div style="background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:10px"><div style="width:30px;height:30px;border-radius:7px;overflow:hidden;background:var(--sf3);flex-shrink:0">${logo(a,30)}</div><div><div style="font-size:13px;font-weight:600">${a.n}</div><div style="font-size:11px;color:var(--mu)">${a.d} · ${a.p}</div></div><button onclick="opD(${a.id});closeQuiz()" style="margin-left:auto;height:26px;padding:0 10px;background:var(--ac);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer">Voir →</button></div>`).join("")}</div><div style="margin-top:1rem;display:flex;gap:6px"><button class="bac" onclick="qStep=0;qAnswers=[];renderQuiz()">Recommencer</button><button class="bac" style="margin-left:auto" onclick="closeQuiz()">Fermer</button></div>`;return;
  }
  const q=QUIZ[qStep];
  steps.innerHTML=`<div class="q-title">${q.q}</div><div class="q-sub">Question ${qStep+1} sur ${QUIZ.length}</div><div class="q-options">${q.opts.map((o,i)=>`<button class="q-opt${qAnswers[qStep]===i?" selected":""}" onclick="qSel(${i})">${o}</button>`).join("")}</div><div class="q-nav">${qStep>0?'<button class="bac" onclick="qStep--;renderQuiz()">← Retour</button>':''}<button class="btn-pri" onclick="qNext()" ${qAnswers[qStep]===undefined?"disabled":""}>Suivant →</button></div>`;
}
function qSel(i){qAnswers[qStep]=i;renderQuiz()}
function qNext(){if(qAnswers[qStep]!==undefined){qStep++;renderQuiz()}}
function getRecos(){
  let filtered=[...AIS];
  if(qAnswers[2]===0)filtered=filtered.filter(a=>a.p==="Gratuit");
  else if(qAnswers[2]===1)filtered=filtered.filter(a=>a.p!=="Payant");
  if(qAnswers[1]===0)filtered=filtered.filter(a=>a.dep.includes("web"));
  else if(qAnswers[1]===1)filtered=filtered.filter(a=>a.dep.includes("local"));
  else if(qAnswers[1]===2)filtered=filtered.filter(a=>a.dep.includes("app"));
  else if(qAnswers[1]===3)filtered=filtered.filter(a=>a.dep.includes("api"));
  const domMap=[["Chatbots","Images","Vidéos","Audio / Voix","Design"],["Code / Dev"],["Agents IA","Productivité"],["Recherche","Finances"],["Éducation","Recherche"],["Productivité","Ventes","Marketing"]];
  const doms=domMap[qAnswers[0]]||[];
  if(doms.length)filtered=filtered.filter(a=>doms.some(d=>a.d.includes(d)));
  return filtered.sort((a,b)=>b.r-a.r).slice(0,5);
}

bld();render();
</script>
